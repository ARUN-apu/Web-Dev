<body>

    <h1>My Media Gallery</h1>

    <!-- Video Section -->
    <div class="gallery-section">
        <h2>Video Files (MP4)</h2>
        <div class="grid-container">
            <div class="media-card">
                <p>Video 1</p>
                <video controls>
                    <source src="1.mp4" type="video/mp4">Your browser does not support the video tag.
