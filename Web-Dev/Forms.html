<!--Quick Quiz:
Without using br tag, write a vertically aligned form asking for name, city and pincode of a user-->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz</title>
</head>

<body>
    <form action="post">
        <div>
            <label for="name">Username</label>
            <input id="name" type="text" name="username" placeholder="Enter your name">
        </div>

        <div>
            <label for="city">City</label>
            <input id="city" type="text" name="city" placeholder="Enter your city">
        </div>

        <div>
            <label for="Pincode">Pincode</label>
            <input id="Pincode" type="number" name="Pincode" placeholder="Enter your Pincode">
        </div>
    </form>
</body>

</html>
