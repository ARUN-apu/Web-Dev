<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Tables</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <table>
        <caption> Employee Details </caption>

        <thead>
            <tr>
                <th> Name </th>
                <th> Designation </th>
                <th> Salary </th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td> Apu </td>
                <td> Programmer Analyst </td>
                <td> 150000</td>
            </tr>

            <tr>
                <td> Arun </td>
                <td> Embedded Engineer </td>
                <td> 200000 </td>
            </tr>
        </tbody>

        <tfoot>
            <td> Footer </td>
        </tfoot>
    </table>
</body>

</html>
